name: Fetch SE News

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# セキュリティ原則:
#  - 他のリポジトリとは完全に独立
#  - 外部へのwrite権限は data/news.json のみ
#  - APIキーは一切使用しない（公開APIのみ）
#  - GITHUB_TOKEN は最小権限 (contents: write のみ)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Fetch SE News (manual only)

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests feedparser
          python -c "import requests; print('requests OK')"

      - name: Fetch news
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_news.py

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --cached --quiet || \
            git commit -m "data: update news $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push